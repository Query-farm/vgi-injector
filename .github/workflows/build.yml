name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CA bundle
        run: ./update-ca-bundle.sh

      - name: Build
        run: zig build -Dversion=${{ steps.version.outputs.version }}

      - name: Check binary
        run: |
          file zig-out/bin/vgi-injector
          ls -lh zig-out/bin/vgi-injector

      - name: Compress with UPX
        run: |
          sudo apt-get install -y upx
          cp zig-out/bin/vgi-injector vgi-injector-linux-amd64
          upx --best vgi-injector-linux-amd64
          ls -lh vgi-injector-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vgi-injector-linux-amd64
          path: vgi-injector-linux-amd64

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: List binaries
        run: ls -lh vgi-injector-*

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          for f in vgi-injector-*; do
            aws s3 cp "$f" "s3://vgi-injector-binaries/injector/${VERSION}/$f" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/octet-stream \
              --cache-control "public, max-age=86400"
          done
          # Also publish as "latest"
          for f in vgi-injector-*; do
            aws s3 cp "$f" "s3://vgi-injector-binaries/injector/latest/$f" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/octet-stream \
              --cache-control "public, max-age=300"
          done

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: List binaries
        run: ls -lh vgi-injector-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vgi-injector-*
