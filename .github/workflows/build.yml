name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Check binary
        run: |
          file zig-out/bin/vgi-injector
          ls -lh zig-out/bin/vgi-injector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vgi-injector
          path: zig-out/bin/vgi-injector

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vgi-injector

      - name: Install UPX
        run: sudo apt-get install -y upx

      - name: Compress with UPX
        run: |
          chmod +x vgi-injector
          cp vgi-injector vgi-injector-upx
          upx --best vgi-injector-upx
          ls -lh vgi-injector vgi-injector-upx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vgi-injector-upx
          path: vgi-injector-upx

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp vgi-injector s3://vgi-injector-binaries/vgi-injector \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/octet-stream \
            --cache-control "public, max-age=86400"
          aws s3 cp vgi-injector-upx s3://vgi-injector-binaries/vgi-injector-upx \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/octet-stream \
            --cache-control "public, max-age=86400"
